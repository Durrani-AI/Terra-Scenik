services:
  - type: web
    name: terrascenik
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: UNSPLASH_KEY
        sync: false
      - key: APP_URL
        value: https://terrascenik.onrender.com
    disk:
      name: uploads
      mountPath: ./Uploads
      sizeGB: 1
